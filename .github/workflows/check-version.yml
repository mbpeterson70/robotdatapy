name: Check Version Increment

on:
  pull_request:
    branches: [main]

jobs:
  check-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if robotdatapy source was changed
        id: source_changed
        run: |
          git fetch origin main
          CHANGED=$(git diff --name-only origin/main...HEAD -- robotdatapy/)
          if [ -z "$CHANGED" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes to robotdatapy/ — skipping version check"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Changes detected in robotdatapy/:"
            echo "$CHANGED"
          fi

      - name: Get version from PR branch
        if: steps.source_changed.outputs.changed == 'true'
        id: pr_version
        run: |
          PR_VERSION=$(grep -Po "version=['\"]\\K[^'\"]*" setup.py)
          echo "version=$PR_VERSION" >> $GITHUB_OUTPUT
          echo "PR version: $PR_VERSION"

      - name: Get version from main branch
        if: steps.source_changed.outputs.changed == 'true'
        id: main_version
        run: |
          git fetch origin main
          MAIN_VERSION=$(git show origin/main:setup.py | grep -Po "version=['\"]\\K[^'\"]*")
          echo "version=$MAIN_VERSION" >> $GITHUB_OUTPUT
          echo "Main version: $MAIN_VERSION"

      - name: Compare versions
        if: steps.source_changed.outputs.changed == 'true'
        run: |
          PR_VERSION="${{ steps.pr_version.outputs.version }}"
          MAIN_VERSION="${{ steps.main_version.outputs.version }}"

          echo "Comparing versions:"
          echo "  Main branch: $MAIN_VERSION"
          echo "  PR branch:   $PR_VERSION"

          # Use Python to compare versions properly (handles 1.2.10 > 1.2.9)
          python3 -c "
          from packaging.version import Version
          pr = Version('$PR_VERSION')
          main = Version('$MAIN_VERSION')
          if pr <= main:
              print(f'ERROR: PR version ({pr}) must be greater than main version ({main})')
              print('Please increment the version in setup.py')
              exit(1)
          print(f'OK: Version incremented from {main} to {pr}')
          "
